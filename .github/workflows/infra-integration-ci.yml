# .github/workflows/infra-integration-ci.yml
name: Infrastructure Integration Test

on:
  push:
    branches: [ "main", "develop", "feature/vault-gateway" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-architecture:
    runs-on: ubuntu-latest
    # Hard ceiling for the whole job - if something hangs badly enough that
    # individual step timeouts don't catch it, this kills the job instead of
    # burning your Actions minutes for hours.
    timeout-minutes: 25

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Configurer l'environnement avec les secrets GitHub
      - name: Setup Secrets
        run: |
          echo "VAULT_LOCAL_UNKEY=temporary_ci_unkey_2026" >> .env
          echo "VAULT_LOCAL_ROOT_TOKEN=temporary_ci_root_token_2026" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'ci_default_secret_key_extremely_long_2026' }}" >> .env
          echo "JWT_EXPIRATION=86400" >> .env
          echo "DB_USER=root" >> .env
          # NOTE: these || fallbacks exist only so this workflow still runs for anyone who
          # forks the repo without configuring their own secrets. They are NOT a real security
          # boundary - anyone relying on this pipeline for anything beyond disposable CI
          # containers should configure the real GitHub secrets below instead.
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD || 'root' }}" >> .env
          echo "USER_BASE_URL=http://user-service:8081" >> .env
          echo "STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY || 'sk_test_ci_placeholder_key' }}" >> .env
          echo "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER || 'ci_minio_user' }}" >> .env
          echo "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD || 'ci_minio_password' }}" >> .env

      # 2. Set up Buildx so we can use GitHub Actions cache for Docker layers.
      #    This is what actually cuts your 36-minute Maven download time down
      #    on repeat runs - only changed deps get re-fetched.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build images first, separately from starting them, so build
      #    failures are clearly distinguished from runtime/startup failures
      #    in the CI log.
      - name: Build Images
        timeout-minutes: 12
        run: |
          docker compose build

      # 4. Start the stack. --wait makes Compose block only until containers
      #    report healthy/running (not indefinitely), and returns non-zero
      #    if that doesn't happen within wait-timeout. This is what prevents
      #    the depends_on: service_completed_successfully hang from eating
      #    your whole CI run if vault-init misbehaves.
      - name: Spin up Infrastructure
        timeout-minutes: 6
        run: |
          docker compose up -d --wait --wait-timeout 180

      # 5. Always dump logs and container state after startup, whether it
      #    succeeded or not - critical for diagnosing what actually happened
      #    inside vault-init without needing to reproduce locally.
      - name: Show Container Status
        if: always()
        run: |
          docker ps -a
          echo "--- vault logs ---"
          docker logs erp-vault || true
          echo "--- vault-init logs ---"
          docker logs erp-vault-init || true

      # 6. Verify Vault actually initialized and unsealed - fail explicitly
      #    if not, rather than limping on to a healthcheck that will just
      #    fail confusingly downstream.
      - name: Verify Vault Initialization
        timeout-minutes: 2
        run: |
          docker exec erp-vault vault status
          SEALED=$(docker exec erp-vault vault status -format=json | grep -o '"sealed":[a-z]*' | cut -d: -f2)
          if [ "$SEALED" != "false" ]; then
            echo "::error::Vault is still sealed - init/unseal failed"
            exit 1
          fi
          echo "Vault is unsealed and ready."

      # 7. S'assurer que le Config Server et Discovery Server répondent bien.
      #    Retries with a short sleep instead of a single curl -f, since
      #    Spring Boot services take 15-25s to finish starting even after
      #    the container is "running".
      - name: Healthcheck Infrastructure Services
        timeout-minutes: 3
        run: |
          echo "Checking Config Server (8888)..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8888/actuator/health; then
              echo "Config Server is up."
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Config Server did not become healthy in time"
              docker logs erp-config-server
              exit 1
            fi
            sleep 5
          done

          echo "Checking Eureka (8761)..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8761 > /dev/null; then
              echo "Eureka is up."
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Eureka did not become healthy in time"
              docker logs erp-discovery-server
              exit 1
            fi
            sleep 5
          done

      # 8. Always tear down, even on failure, so nothing lingers on the runner.
      - name: Tear Down
        if: always()
        run: |
          docker compose down -v