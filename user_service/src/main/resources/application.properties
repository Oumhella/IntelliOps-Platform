spring.application.name=user-service
spring.config.import=configserver:${CONFIG_SERVER_URL:http://localhost:8888}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

server.port=8081
#server.servlet.context-path=/api

# ── Base de données PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/erp
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# La syntaxe :${...} fournit une valeur par défaut si JWT_SECRET n'est pas défini
app.jwt.expiration=${JWT_EXPIRATION:86400000}

spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on_param
spring.mvc.problem-details.enabled=true

spring.cloud.config.fail-fast=true
spring.cloud.config.retry.enabled=true
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=10000

openapi.service.title=user Service API
openapi.service.description=Gestion des utilisateurs, rôles et permissions.
openapi.service.version=1.0.0