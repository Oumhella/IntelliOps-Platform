spring.application.name=paiement-service
spring.config.import=configserver:${CONFIG_SERVER_URL:http://localhost:8888}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

server.port=8086

# ── Base de données PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/erp_paiement
spring.datasource.driver-class-name=org.postgresql.Driver
# username/password intentionally NOT declared here - supplied entirely by Vault
# via spring.config.import above. If Vault is unreachable, startup correctly fails
# instead of silently falling back to a guessed value.

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.expiration=${JWT_EXPIRATION:86400000}
# app.jwt.secret intentionally NOT declared here - supplied by Vault

# ── Error Handling ──
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on_param
spring.mvc.problem-details.enabled=true

# ── Config Server (retry on startup) ──
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.enabled=true
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=10000

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

#---------------------MINIO--------------------
minio.url=${MINIO_URL:http://localhost:9000}
minio.bucket-name=${MINIO_BUCKET_NAME:invoices-erp}
# access-key/secret-key intentionally NOT declared here - supplied by Vault

#---------------------Open API-----------------
openapi.service.title=payment Service API
openapi.service.description=Gestion des transactions et le paiement
openapi.service.version=1.0.0