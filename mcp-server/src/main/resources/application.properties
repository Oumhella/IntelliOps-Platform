spring.application.name=mcp-server
server.port=8085
spring.config.import=configserver:${CONFIG_SERVER_URL:http://localhost:8888}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

spring.ai.mcp.server.name=erp-operations-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

services.lead-service.url=${LEAD_SERVICE_URL:http://localhost:8082}
services.stock-service.url=${STOCK_SERVICE_URL:http://localhost:8084}

# A mutation is always previewed, then confirmed by a separate call. Tokens are one-time and short-lived.
mcp.approval.ttl-seconds=${MCP_APPROVAL_TTL_SECONDS:300}

# NVIDIA NIM exposes an OpenAI-compatible API. Do not put the key in source control.
# Set NVIDIA_API_KEY and optionally NVIDIA_MODEL when the conversational agent is enabled.
spring.ai.openai.api-key=${NVIDIA_API_KEY:}
# Spring AI appends /v1/chat/completions itself; keep the provider base URL at its host.
spring.ai.openai.base-url=${NVIDIA_BASE_URL:https://integrate.api.nvidia.com}
spring.ai.openai.chat.options.model=${NVIDIA_MODEL:meta/llama-3.3-70b-instruct}
# Spring AI 1.0 selects model providers through these properties. "none" prevents
# any NVIDIA/OpenAI-compatible client from starting before a key is available.
agent.llm.provider=${AGENT_LLM_PROVIDER:none}
spring.ai.model.chat=${agent.llm.provider}
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.moderation=none

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true


#---------------------Open API-----------------
openapi.service.title=mcp Server API
openapi.service.description=Mcp Server API for managing leads, stock, and other operations.
openapi.service.version=1.0.0