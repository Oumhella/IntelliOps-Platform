services:
  erp-db:
    image: postgres:15-alpine
    container_name: erp-postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=erp
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - erp-db-data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - erp-network

    # --- INFRASTRUCTURE DE SÉCURITÉ & CONFIGURATION ---
  vault:
    image: hashicorp/vault:1.15.2
    container_name: erp-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    networks:
      - erp-network
    volumes:
      - ./vault/config:/vault/config
      - ./vault/file:/vault/file
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
    entrypoint: [ "vault", "server", "-config=/vault/config/vault-config.json" ]

  vault-init:
    image: hashicorp/vault:1.15.2
    container_name: erp-vault-init
    depends_on:
      - vault
    networks:
      - erp-network
    volumes:
      - ./vault/file:/vault/file
      - ./vault/init:/vault/init
    env_file:
      - .env # Injecte les secrets locaux de .env de manière sécurisée
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_UNKEY=${VAULT_LOCAL_UNKEY}
      - VAULT_ROOT_TOKEN=${VAULT_LOCAL_ROOT_TOKEN}
    entrypoint: [ "/bin/sh", "/vault/init/init-vault.sh" ]

  config-server:
    build:
      context: .
      dockerfile: ./config-server/Dockerfile
    container_name: erp-config-server
    ports:
      - "8888:8888"
    networks:
      - erp-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
    volumes:
      - ./vault/file:/vault/file
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=vault
      - SPRING_CLOUD_VAULT_HOST=vault
      - SPRING_CLOUD_VAULT_PORT=8200
      - SPRING_CLOUD_VAULT_SCHEME=http
      - SPRING_CLOUD_CONFIG_SERVER_VAULT_HOST=vault
      - SPRING_CLOUD_CONFIG_SERVER_VAULT_PORT=8200
      - SPRING_CLOUD_CONFIG_SERVER_VAULT_SCHEME=http
      - SPRING_CLOUD_VAULT_AUTHENTICATION=APPROLE
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
  # --- MICROSERVICES ARCHITECTURE ---
  discovery-server:
    build:
      context: .
      dockerfile: ./discovery-server/Dockerfile
    container_name: erp-discovery-server
    ports:
      - "8761:8761"
    networks:
      - erp-network

  gateway-service:
    build:
      context: .
      dockerfile: ./gateway_service/Dockerfile
    container_name: erp-gateway-service
    ports:
      - "8080:8080"
    networks:
      - erp-network
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: user_service
        SERVICE_PORT: 8081
    container_name: erp-user-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://erp-db:5432/erp_users
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      erp-db:
        condition: service_started
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    networks:
      - erp-network

  lead-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: lead_service
        SERVICE_PORT: 8082
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://erp-db:5432/erp_leads
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      erp-db:
        condition: service_started
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    networks:
      - erp-network

  abonnement-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: abonnement_service
        SERVICE_PORT: 8083
    container_name: erp-abonnement-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://erp-db:5432/erp_abonnements
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      erp-db:
        condition: service_started
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    networks:
      - erp-network


  stock-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: stock_service
        SERVICE_PORT: 8084
    container_name: erp-stock-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://erp-db:5432/erp_stocks
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      erp-db:
        condition: service_started
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    networks:
      - erp-network

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: mcp-server
        SERVICE_PORT: 8085
    container_name: erp-mcp-server
    # Internal only: clients reach its HTTP API through the secured gateway.
    expose:
      - "8085"
    env_file:
      - .env
    environment:
      - LEAD_SERVICE_URL=http://lead-service:8082
      - STOCK_SERVICE_URL=http://stock-service:8084
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
      lead-service:
        condition: service_started
      stock-service:
        condition: service_started
    networks:
      - erp-network

  # ─────────────── MINIO SERVER ───────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z # Ou tag récent
    container_name: erp-minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────── AUTO-CREATION BUCKET ───────────────
  createbuckets:
    image: minio/mc
    container_name: erp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb myminio/invoices-erp --ignore-existing;
      /usr/bin/mc anonymous set download myminio/invoices-erp;
      exit 0;
      "
    networks:
      - erp-network
  paiement-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: paiement_service
        SERVICE_PORT: 8086
    container_name: erp-paiement-service
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://erp-db:5432/erp_paiement
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      erp-db:
        condition: service_started
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - erp-network

#  crm-frontend:
#    build: ./crm-frontend
#    ports:
#      - "4200:80"
#    networks:
#      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  erp-db-data:
  minio_data:
