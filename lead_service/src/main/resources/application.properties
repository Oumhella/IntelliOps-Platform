spring.application.name=lead-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

server.port=8082

# ── Base de données PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/erp_leads
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#= -- JWT Configuration --
app.jwt.secret=${JWT_SECRET:MaCleSecreteUltraSecuriseeDeSecoursPourLeCRM2026QuiFaitPlusDe32Caracteres!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}


# ── Error Handling ──
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on_param
spring.mvc.problem-details.enabled=true

# ── Config Server (retry on startup) ──
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.enabled=true
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=10000
# Profil actif par defaut = local si rien n'est precise (IDE, mvn spring-boot:run)
# Docker Compose passera SPRING_PROFILES_ACTIVE=docker et prendra le dessus automatiquement
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

openapi.service.title=Lead Service API
openapi.service.description=Gestion des opportunités commercialisables, commandes et clients.
openapi.service.version=1.0.0